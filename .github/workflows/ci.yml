name: Continuous Integration

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  test-vulnlog:
    name: Test Homebrew installation
    strategy:
      fail-fast: false
      matrix:
        # macos-latest = Apple Silicon (arm64, native binary path)
        # macos-13     = Intel (x86_64, JVM fallback path)
        os: [macos-latest, macos-13]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main

      - name: Install vulnlog
        run: brew install --verbose vulnlog/vulnlog/vulnlog

      - name: Verify vulnlog installation
        run: |
          which vulnlog
          vulnlog --version
