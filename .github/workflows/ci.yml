name: Continuous Integration

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  test-vulnlog:
    name: Test Homebrew installation
    # GitHub-hosted free Intel macOS runners have been retired; all hosted
    # macOS runners are Apple Silicon. The Intel JVM-fallback install path
    # in vulnlog.rb is therefore not exercised by CI.
    runs-on: macos-latest
    steps:
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main

      - name: Install vulnlog
        run: brew install --verbose vulnlog/vulnlog/vulnlog

      - name: Verify vulnlog installation
        run: |
          which vulnlog
          vulnlog --version
